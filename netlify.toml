[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API routes — all go to Netlify functions ──
[[redirects]]
  from = "/api/submit-form"
  to = "/.netlify/functions/submit-form"
  status = 200

[[redirects]]
  from = "/api/approve"
  to = "/.netlify/functions/approve"
  status = 200

[[redirects]]
  from = "/api/paystack-webhook"
  to = "/.netlify/functions/paystack-webhook"
  status = 200

[[redirects]]
  from = "/api/dashboard/*"
  to = "/.netlify/functions/dashboard"
  status = 200

# ── environment variables needed (set in Netlify dashboard) ──
# SUPABASE_URL
# SUPABASE_SERVICE_KEY        ← service role key (not anon), never exposed to frontend
# ANTHROPIC_API_KEY
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_WHATSAPP_FROM        ← e.g. whatsapp:+14155238886
# OWNER_WHATSAPP              ← your WhatsApp number e.g. whatsapp:+2348100000000
# BREVO_API_KEY
# OWNER_EMAIL
# PAYSTACK_SECRET_KEY
# PAYSTACK_WEBHOOK_SECRET
# BASE_URL                    ← your Netlify URL e.g. https://lumiee.netlify.app
